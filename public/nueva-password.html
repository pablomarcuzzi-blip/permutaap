<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - PermutApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 440px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 1.6rem; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        .input-wrapper { position: relative; }
        .input-wrapper input {
            width: 100%;
            padding: 12px 45px 12px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .input-wrapper input:focus { outline: none; border-color: #667eea; }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #999;
            padding: 0;
        }
        .toggle-password:hover { color: #667eea; }
        button.btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button.btn-primary:hover { transform: translateY(-2px); }
        button.btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .mensaje {
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            display: none;
        }
        .mensaje-ok { background: #d4edda; color: #155724; }
        .mensaje-error { background: #f8d7da; color: #721c24; }
        .mensaje-warning { background: #fff3cd; color: #856404; }
        .icono { font-size: 3.5rem; margin-bottom: 16px; }
        .btn-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .btn-link:hover { text-decoration: underline; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #eee;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card" id="contenido">
        <div class="spinner"></div>
        <p style="color:#666;">Verificando enlace...</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const contenido = document.getElementById('contenido');

        function mostrarFormulario() {
            contenido.innerHTML = `
                <div class="icono">🔐</div>
                <h1>Nueva contraseña</h1>
                <p class="subtitle">Ingresá tu nueva contraseña</p>
                <div id="mensajeError" class="mensaje mensaje-error"></div>
                <div class="form-group">
                    <label>Nueva contraseña *</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres" minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePass('password', this)" tabindex="-1">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Repetir contraseña *</label>
                    <div class="input-wrapper">
                        <input type="password" id="repetir" placeholder="Repetí tu contraseña" minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePass('repetir', this)" tabindex="-1">👁️</button>
                    </div>
                </div>
                <button class="btn-primary" id="btnGuardar" onclick="guardar()">Guardar contraseña</button>
                <br>
                <a href="/login.html" class="btn-link">← Volver al login</a>
            `;
        }

        function mostrarVencido() {
            contenido.innerHTML = `
                <div class="icono">⏰</div>
                <h1 style="color:#e67e22;">Enlace vencido</h1>
                <p style="color:#666;margin:12px 0 24px;">Este enlace venció (tiene validez de 2 horas).<br>Solicitá uno nuevo.</p>
                <a href="/recuperar-password.html" class="btn-primary" style="display:block;padding:14px;text-decoration:none;border-radius:10px;font-weight:600;color:white;">Solicitar nuevo enlace</a>
            `;
        }

        function mostrarError() {
            contenido.innerHTML = `
                <div class="icono">❌</div>
                <h1 style="color:#dc3545;">Enlace inválido</h1>
                <p style="color:#666;margin:12px 0 24px;">Este enlace no es válido o ya fue utilizado.</p>
                <a href="/recuperar-password.html" class="btn-primary" style="display:block;padding:14px;text-decoration:none;border-radius:10px;font-weight:600;color:white;">Solicitar nuevo enlace</a>
            `;
        }

        function mostrarExito() {
            contenido.innerHTML = `
                <div class="icono">✅</div>
                <h1 style="color:#28a745;">¡Contraseña actualizada!</h1>
                <p style="color:#666;margin:12px 0 24px;">Ya podés ingresar con tu nueva contraseña.</p>
                <a href="/login.html" class="btn-primary" style="display:block;padding:14px;text-decoration:none;border-radius:10px;font-weight:600;color:white;">Ingresar ahora</a>
            `;
        }

        async function guardar() {
            const password = document.getElementById('password').value;
            const repetir = document.getElementById('repetir').value;
            const errDiv = document.getElementById('mensajeError');
            const btn = document.getElementById('btnGuardar');

            errDiv.style.display = 'none';

            if (password.length < 6) {
                errDiv.textContent = 'La contraseña debe tener al menos 6 caracteres';
                errDiv.style.display = 'block';
                return;
            }
            if (password !== repetir) {
                errDiv.textContent = 'Las contraseñas no coinciden';
                errDiv.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Guardando...';

            try {
                const res = await fetch('/api/nueva-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();

                if (res.ok) {
                    mostrarExito();
                } else if (res.status === 410 || data.error === 'token_vencido') {
                    mostrarVencido();
                } else {
                    errDiv.textContent = data.error || 'Error al guardar la contraseña';
                    errDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Guardar contraseña';
                }
            } catch (e) {
                errDiv.textContent = 'Error de conexión. Intentá más tarde.';
                errDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Guardar contraseña';
            }
        }

        function togglePass(id, btn) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'password' ? '👁️' : '🙈';
        }

        // Verificar que el token existe en la URL
        if (!token) {
            mostrarError();
        } else {
            mostrarFormulario();
        }
    </script>
</body>
</html>
