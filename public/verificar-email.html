<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PermutApp - Verificación de cuenta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 48px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .icono { font-size: 4rem; margin-bottom: 16px; }

        h1 { font-size: 1.6rem; margin-bottom: 12px; }

        p { color: #555; line-height: 1.6; margin-bottom: 24px; }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .btn:hover { transform: translateY(-2px); }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secundario {
            background: #f5f5f5;
            color: #555;
            margin-top: 10px;
            display: block;
            text-align: center;
        }

        /* Estado cargando */
        .estado-cargando h1 { color: #667eea; }

        /* Estado éxito */
        .estado-exito h1 { color: #3a7; }

        /* Estado error */
        .estado-error h1 { color: #c33; }

        /* Estado vencido */
        .estado-vencido h1 { color: #e67e22; }

        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid #eee;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card" id="contenido">
        <!-- Se rellena por JS -->
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const contenido = document.getElementById('contenido');

        function mostrarCargando() {
            contenido.className = 'card estado-cargando';
            contenido.innerHTML = `
                <div class="spinner"></div>
                <h1>Verificando tu cuenta...</h1>
                <p>Un momento, por favor.</p>
            `;
        }

        function mostrarExito() {
            contenido.className = 'card estado-exito';
            contenido.innerHTML = `
                <div class="icono">✅</div>
                <h1>¡Cuenta verificada!</h1>
                <p>Tu correo fue confirmado correctamente.<br>Ya podés ingresar a PermutApp.</p>
                <a href="/login.html" class="btn btn-primary">Ingresar ahora</a>
            `;
        }

        function mostrarVencido() {
            contenido.className = 'card estado-vencido';
            contenido.innerHTML = `
                <div class="icono">⏰</div>
                <h1>El enlace venció</h1>
                <p>El enlace de verificación tiene una validez de 48 horas y ya expiró.<br>
                Podés solicitar uno nuevo desde la pantalla de verificación.</p>
                <a href="/pendiente-verificacion.html" class="btn btn-primary">Solicitar nuevo enlace</a>
            `;
        }

        function mostrarError() {
            contenido.className = 'card estado-error';
            contenido.innerHTML = `
                <div class="icono">❌</div>
                <h1>Enlace inválido</h1>
                <p>Este enlace de verificación no es válido o ya fue utilizado.</p>
                <a href="/login.html" class="btn btn-primary">Ir al inicio</a>
                <a href="/registro.html" class="btn btn-secundario">Registrarme de nuevo</a>
            `;
        }

        async function verificar() {
            if (!token) {
                mostrarError();
                return;
            }

            mostrarCargando();

            try {
                const res = await fetch(`/api/verificar-email?token=${encodeURIComponent(token)}`);
                const data = await res.json();

                if (res.ok) {
                    mostrarExito();
                } else if (res.status === 410 || data.error === 'token_vencido') {
                    mostrarVencido();
                } else {
                    mostrarError();
                }
            } catch (e) {
                mostrarError();
            }
        }

        verificar();
    </script>
</body>
</html>
