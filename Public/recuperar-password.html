<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - PermutApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .back-link { margin-top: 20px; }
        .back-link a { color: #667eea; text-decoration: none; }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .success.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Recuperar Acceso</h1>
        <p class="subtitle">Ingresá tu email y te enviaremos instrucciones</p>
        
        <div id="successMsg" class="success">
            Si el email está registrado, recibirás instrucciones para recuperar tu cuenta.
        </div>

        <form id="recuperarForm">
            <div class="form-group">
                <label for="email">Email @bue.edu.ar</label>
                <input type="email" id="email" placeholder="tu-email@bue.edu.ar" required>
            </div>
            <button type="submit">Enviar Instrucciones</button>
        </form>

        <div class="back-link">
            <a href="login.html">← Volver al login</a>
        </div>
    </div>

    <script>
        document.getElementById('recuperarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            
            try {
                const response = await fetch('/api/recuperar-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                
                document.getElementById('successMsg').classList.add('show');
                document.getElementById('recuperarForm').reset();
                
            } catch (error) {
                alert('Error de conexión');
            }
        });
    </script>
</body>
</html>
