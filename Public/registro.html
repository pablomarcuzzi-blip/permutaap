<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PermutApp - Registro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input.input-error {
            border-color: #c33;
        }

        .field-hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .input-password-wrapper {
            position: relative;
        }

        .input-password-wrapper input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #999;
            padding: 0;
            line-height: 1;
        }

        .toggle-password:hover { color: #667eea; }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
        }

        .btn-register:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3a7;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            line-height: 1.6;
        }

        .success-message .icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 8px;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>📚 PermutApp</h1>
            <p>Crear nueva cuenta</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="nombre">Nombre completo *</label>
                <input type="text" id="nombre" required placeholder="Tu nombre y apellido">
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" placeholder="Opcional">
            </div>

            <div class="form-group">
                <label for="email">Correo institucional *</label>
                <input type="email" id="email" required placeholder="tu@bue.edu.ar">
                <div class="field-hint">Solo se acepta correo @bue.edu.ar</div>
            </div>

            <div class="form-group">
                <label for="confirmarEmail">Confirmar correo *</label>
                <input type="email" id="confirmarEmail" required placeholder="Repetí tu correo" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Contraseña *</label>
                <div class="input-password-wrapper">
                    <input type="password" id="password" required placeholder="Mínimo 6 caracteres" minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)" tabindex="-1">👁️</button>
                </div>
            </div>

            <div class="form-group">
                <label for="repetirPassword">Repetir contraseña *</label>
                <div class="input-password-wrapper">
                    <input type="password" id="repetirPassword" required placeholder="Repetí tu contraseña" minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePassword('repetirPassword', this)" tabindex="-1">👁️</button>
                </div>
            </div>

            <button type="submit" class="btn-register" id="btnRegistrar">Crear cuenta</button>
        </form>

        <div class="login-link">
            ¿Ya tenés cuenta? <a href="/login.html">Ingresá aquí</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const confirmarEmail = document.getElementById('confirmarEmail').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const repetirPassword = document.getElementById('repetirPassword').value;
            
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const btn = document.getElementById('btnRegistrar');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Validar dominio @bue.edu.ar
            if (!email.endsWith('@bue.edu.ar')) {
                errorDiv.textContent = 'Solo se acepta el correo institucional (@bue.edu.ar)';
                errorDiv.style.display = 'block';
                document.getElementById('email').classList.add('input-error');
                return;
            }
            document.getElementById('email').classList.remove('input-error');

            // Validar que los emails coincidan
            if (email !== confirmarEmail) {
                errorDiv.textContent = 'Los correos electrónicos no coinciden';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Validar que las contraseñas coincidan
            if (password !== repetirPassword) {
                errorDiv.textContent = 'Las contraseñas no coinciden';
                errorDiv.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creando cuenta...';
            
            try {
                const res = await fetch('/api/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, telefono, email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('registerForm').style.display = 'none';
                    successDiv.innerHTML = `
                        <span class="icon">📬</span>
                        <strong>¡Cuenta creada!</strong><br>
                        Te enviamos un email a <strong>${email}</strong><br>
                        Hacé clic en el enlace para activar tu cuenta.<br><br>
                        <small>Revisá también la carpeta de spam.</small>
                    `;
                    successDiv.style.display = 'block';
                } else {
                    errorDiv.textContent = data.error || 'Error al registrar';
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Crear cuenta';
                }
            } catch (err) {
                errorDiv.textContent = 'Error de conexión con el servidor';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Crear cuenta';
            }
        });

        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }
    </script>
</body>
</html>
