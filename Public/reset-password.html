<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - PermutApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .error.show { display: block; }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .success.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Confirmar Recuperación</h1>
        <p class="subtitle" id="mensaje">Verificando token...</p>
        
        <div id="errorMsg" class="error">Token inválido o expirado</div>
        <div id="successMsg" class="success">
            ¡Cuenta recuperada! Redirigiendo al login...
        </div>

        <button id="confirmarBtn" style="display: none;" onclick="confirmarRecuperacion()">
            Confirmar y Activar Cuenta
        </button>

        <div style="margin-top: 20px;">
            <a href="login.html" style="color: #667eea; text-decoration: none;">← Volver al login</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('errorMsg').classList.add('show');
            document.getElementById('mensaje').textContent = 'Token no proporcionado';
        } else {
            fetch(`/api/verificar-token-recuperacion/${token}`)
                .then(res => res.json())
                .then(data => {
                    if (data.valido) {
                        document.getElementById('mensaje').textContent = 
                            `Hola, confirmá para activar el acceso a ${data.email}`;
                        document.getElementById('confirmarBtn').style.display = 'block';
                    } else {
                        document.getElementById('errorMsg').classList.add('show');
                        document.getElementById('mensaje').textContent = 'Token inválido';
                    }
                })
                .catch(() => {
                    document.getElementById('errorMsg').classList.add('show');
                });
        }

        async function confirmarRecuperacion() {
            const btn = document.getElementById('confirmarBtn');
            btn.disabled = true;
            btn.textContent = 'Procesando...';

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });

                if (response.ok) {
                    document.getElementById('successMsg').classList.add('show');
                    btn.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    document.getElementById('errorMsg').classList.add('show');
                    btn.disabled = false;
                    btn.textContent = 'Confirmar y Activar Cuenta';
                }
            } catch (error) {
                alert('Error de conexión');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
